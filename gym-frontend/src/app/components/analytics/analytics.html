<section class="analytics-page">
  <div class="analytics-header">
    <h1 class="page-title">Analytics</h1>
    <p class="page-subtitle">Track the most popular classes in your gym system</p>
  </div>

  <p class="message">{{ message }}</p>

  <div class="analytics-card" *ngIf="popularClasses.length > 0">
    <h2>Most Popular Classes</h2>

    <div class="chart-list">
      <div class="chart-row" *ngFor="let item of popularClasses">
        <div class="chart-info">
          <h3>{{ item.title }}</h3>
          <p>{{ item.type }} • {{ item.instructor }}</p>
        </div>

        <div class="chart-bar-wrapper">
          <div
            class="chart-bar"
            [style.width]="getBarWidth(item.bookings_count)"
          ></div>
        </div>

        <div class="chart-value">
          {{ item.bookings_count }}
        </div>
      </div>
    </div>
  </div>
</section>
